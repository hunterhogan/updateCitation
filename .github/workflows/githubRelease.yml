name: Make GitHub Release

on:
  workflow_run:
    workflows: ["Python Tests"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '>=3.11'
      - name: Get package version
        id: getVersionPackage
        run: |
          versionPackage=$(python -c "import tomllib; from pathlib import Path; print(tomllib.loads(Path('pyproject.toml').read_text())['project']['version'])")
          echo "versionPackage=$versionPackage" >> "$GITHUB_OUTPUT"
      - name: Check for existing release
        id: checkRelease
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -c "
          import os, urllib.error, urllib.request
          request = urllib.request.Request(
            f'https://api.github.com/repos/{os.environ[\"GITHUB_REPOSITORY\"]}/releases/tags/${{ steps.getVersionPackage.outputs.versionPackage }}',
            headers={
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {os.environ[\"GITHUB_TOKEN\"]}',
              'X-GitHub-Api-Version': '2022-11-28',
            })
          try:
            urllib.request.urlopen(request)
            exists = 'true'
          except urllib.error.HTTPError as ERRORmessage:
            if ERRORmessage.code != 404:
              raise
            exists = 'false'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as appendStream:
            appendStream.write(f'exists={exists}\n')
          "
      - name: Create GitHub Release
        if: steps.checkRelease.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python -c "
          import json, os, urllib.request
          dictionaryRelease = {
            'tag_name': '${{ steps.getVersionPackage.outputs.versionPackage }}',
            'name': '${{ steps.getVersionPackage.outputs.versionPackage }}',
            'draft': False,
            'prerelease': False,
          }
          request = urllib.request.Request(
            f'https://api.github.com/repos/{os.environ[\"GITHUB_REPOSITORY\"]}/releases',
            data=json.dumps(dictionaryRelease).encode(),
            headers={
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {os.environ[\"GITHUB_TOKEN\"]}',
              'Content-Type': 'application/json',
              'X-GitHub-Api-Version': '2022-11-28',
            },
            method='POST')
          urllib.request.urlopen(request)
          "
